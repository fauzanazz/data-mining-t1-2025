# Frequent Pattern Mining Pipeline Configuration
# ==============================================

# Pipeline settings
pipeline:
  name: "FP Mining Pipeline"
  verbose: true

# Dataset configurations
datasets:
  - name: "Retail-Categories"
    loader:
      type: "csv"
      path: "datasets/Retail_Transaction_Dataset.csv"
      options:
        # Additional pandas read_csv options
        # encoding: "utf-8"
        # sep: ","
    transformer:
      type: "retail"
      options:
        group_col: "CustomerID"
        item_col: "ProductCategory"

  # Add more datasets as needed
  # - name: "Retail-Products"
  #   loader:
  #     type: "csv"
  #     path: "datasets/Retail_Transaction_Dataset.csv"
  #   transformer:
  #     type: "retail"
  #     options:
  #       group_col: "CustomerID"
  #       item_col: "ProductID"

# Algorithm configurations
algorithms:
  - name: "apriori"
    type: "apriori"
    params:
      min_support: 0.01
      min_confidence: 0.5
      max_len: null  # null for no limit

  - name: "fpgrowth"
    type: "fpgrowth"
    params:
      min_support: 0.01
      min_confidence: 0.5
      max_len: null

# Evaluator configurations
evaluators:
  - name: "coverage"
    type: "coverage"

  - name: "quality"
    type: "quality"
    params:
      high_confidence_threshold: 0.8
      high_lift_threshold: 2.0

  - name: "performance"
    type: "performance"

# Output configuration
output:
  # Save results to file
  save_results: true
  output_dir: "output/fp_mining"

  # Output formats
  formats:
    - "json"
    # - "csv"

  # Print summary to console
  print_summary: true

  # Number of top rules to display
  top_rules: 10
